<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tuoyl</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 90%;
      max-width: 620px;
      padding: 42px;
      border: 1px solid #30363d;
      border-radius: 24px;
      background: #161b22;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 42px;
    }

    p {
      color: #8b949e;
      line-height: 1.8;
    }

    .links {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    a {
      color: #58a6ff;
      text-decoration: none;
      border: 1px solid #30363d;
      padding: 10px 16px;
      border-radius: 999px;
      background: #0d1117;
    }

    a:hover {
      border-color: #58a6ff;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Tuoyl</h1>
    <p>
      Web / Security / AI Tools Builder.<br />
      这里是我的个人博客和项目主页，记录技术、项目和学习过程。
    </p>

    <div class="links">
      <a href="https://github.com/tuoyl1">GitHub</a>
      <a href="https://x.com/xwgutoly">Twitter / X</a>
    </div>
  </main>
</body>
</html>
